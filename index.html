<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Waste Production Chart</title>
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>
    <style>
        #container {
            width: 100%;
            height: 400px;
        }
    </style>
</head>
<body>

    <div id="container"></div>

    <script>
        // API Endpoint for the specific dataset
        const API_URL = 'https://datasource.kapsarc.org/api/records/1.0/search/?dataset=waste_production_rate_per_individual_en_0&rows=100';

        async function updateChart() {
            try {
                const response = await fetch(API_URL);
                const json = await response.json();
                const records = json.records;

                // 1. Process data: Group by 'variable' and sort by 'year'
                const seriesData = {};

                records.forEach(record => {
                    const { year, value, variable } = record.fields;
                    
                    if (!seriesData[variable]) {
                        seriesData[variable] = [];
                    }
                    
                    // Push [x, y] pairs. Use parseInt for year to ensure numerical x-axis
                    seriesData[variable].push([parseInt(year), value]);
                });

                // 2. Convert the grouped data into Highcharts series format
                const finalSeries = Object.keys(seriesData).map(name => {
                    return {
                        name: name,
                        data: seriesData[name].sort((a, b) => a[0] - b[0]) // Sort by year
                    };
                });

                // 3. Initialize or update the chart
                Highcharts.chart('container', {
                    chart: {
                        type: 'line'
                    },
                    title: {
                        text: 'Waste Production Rate Per Individual',
                        align: 'left'
                    },
                    subtitle: {
                        text: 'Source: <a href="https://datasource.kapsarc.org/" target="_blank">KAPSARC Data Portal</a>',
                        align: 'left'
                    },
                    xAxis: {
                        title: { text: 'Year' },
                        tickInterval: 1
                    },
                    yAxis: {
                        title: { text: 'Value' }
                    },
                    legend: {
                        layout: 'vertical',
                        align: 'right',
                        verticalAlign: 'middle'
                    },
                    plotOptions: {
                        series: {
                            label: { connectorAllowed: false }
                        }
                    },
                    series: finalSeries,
                    responsive: {
                        rules: [{
                            condition: { maxWidth: 500 },
                            chartOptions: {
                                legend: {
                                    layout: 'horizontal',
                                    align: 'center',
                                    verticalAlign: 'bottom'
                                }
                            }
                        }]
                    }
                });

            } catch (error) {
                console.error('Error fetching data:', error);
            }
        }

        // Initial load
        updateChart();

        // Refresh data every 10 minutes (600,000 ms) to keep it updated
        setInterval(updateChart, 600000);
    </script>
</body>
</html>
