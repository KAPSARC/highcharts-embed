<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Waste Production Chart</title>
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>
    <style>
        #container {
            width: 100%;
            height: 400px;
        }
    </style>
</head>
<body>

    <div id="container"></div>

  <script src="https://code.highcharts.com/modules/dumbbell.js"></script>

<script>
const API_URL = 'https://datasource.kapsarc.org/explore/assets/methane-intensity-satellite-observed-vs-reported-emissions/api/';

async function updateChart() {
    try {
        const response = await fetch(API_URL);
        const json = await response.json();

        const records = json.results || json.records || [];

        const dumbbellData = [];
        const edgarData = [];

        records.forEach((r, index) => {
            const f = r.fields || r;

            const country = f.country || f.name;
            if (!country) return;

            const satellite = f.satellite_2019_2023_average;
            const iea = f.iea_2024;
            const edgar = f.edgar_2024;

            dumbbellData.push({
                name: country,
                low: satellite,
                high: iea,
                edgar: edgar,
                color: '#7cb5ec', // connector color
                lowColor: '#2b908f',   // Satellite
                highColor: '#f45b5b'   // IEA
            });

            edgarData.push({
                x: index,
                y: edgar,
                name: country
            });
        });

        Highcharts.chart('container', {

            chart: {
                type: 'dumbbell',
                inverted: true
            },

            title: {
                text: 'Methane Intensity Comparison'
            },

            subtitle: {
                text: 'Satellite vs IEA vs EDGAR'
            },

            xAxis: {
                type: 'category'
            },

            yAxis: {
                title: {
                    text: 'Methane Intensity'
                }
            },

            tooltip: {
                formatter: function () {
                    if (this.point.low !== undefined) {
                        return `<b>${this.point.name}</b><br/>
                                Satellite: ${this.point.low}<br/>
                                IEA: ${this.point.high}<br/>
                                EDGAR: ${this.point.edgar}`;
                    }
                    return false;
                }
            },

            plotOptions: {
                series: {
                    dataSorting: {
                        enabled: true,
                        sortKey: 'low'
                    }
                },
                dumbbell: {
                    dataLabels: {
                        enabled: true,
                        formatter: function () {
                            return this.point.low + ' / ' + this.point.high;
                        },
                        style: {
                            fontSize: '10px'
                        }
                    }
                }
            },

            series: [
                {
                    name: 'Satellite vs IEA',
                    data: dumbbellData
                },
                {
                    type: 'scatter',
                    name: 'EDGAR 2024',
                    data: edgarData,
                    color: '#90ed7d',
                    marker: {
                        symbol: 'circle',
                        radius: 6
                    },
                    dataLabels: {
                        enabled: true,
                        format: '{y}',
                        style: {
                            fontSize: '10px'
                        }
                    }
                }
            ]
        });

    } catch (error) {
        console.error('Error fetching data:', error);
    }
}

// initial load
updateChart();

// auto refresh
setInterval(updateChart, 600000);
</script>

</body>
</html>
