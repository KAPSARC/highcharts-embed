<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Highcharts Column Chart</title>
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }
        #container {
            width: 100%;
            height: 400px;
        }
    </style>
</head>
<body>

<div id="container"></div>


<script>
fetch('https://datasource.kapsarc.org/api/explore/v2.1/catalog/datasets/share-of-global-plastic-waste-emitted-to-the-ocean-2019/records/?limit=10&order_by=share_of_global_plastic_waste_emitted_to_the_ocean_2019%20desc')
  .then(response => response.json())
  .then(apiData => {

    const categories = [];
    const values = [];

    apiData.results.forEach(item => {
        categories.push(item.country_name);
        values.push(item.share_of_global_plastic_waste_emitted_to_the_ocean_2019);
    });

    Highcharts.chart('container', {
        chart: { type: 'column' },
        title: { text: 'Top 10 Plastic Waste to Ocean (2019)' },
        xAxis: { categories: categories },
        yAxis: {
            title: { text: 'Share (%)' }
        },
        series: [{
            name: 'Share',
            data: values
        }]
    });

  })
  .catch(err => console.error('API error:', err));
</script>


</body>
</html>
