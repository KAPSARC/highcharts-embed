<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Waste Production Chart</title>
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>
    <style>
        #container {
            width: 100%;
            height: 400px;
        }
    </style>
</head>
<body>

    <div id="container"></div>

   <script>
    const API_URL = 'https://datasource.kapsarc.org/explore/assets/methane-intensity-satellite-observed-vs-reported-emissions/api/';

    async function updateChart() {
        try {
            const response = await fetch(API_URL);
            const json = await response.json();

            // Adjust depending on API structure
            const records = json.results || json.records || [];

            const countries = [];
            const satellite = [];
            const iea = [];
            const edgar = [];

            records.forEach(r => {
                const f = r.fields || r;

                const country = f.country || f.name;

                if (!country) return;

                countries.push(country);

                satellite.push(f.satellite_2019_2023_average || null);
                iea.push(f.iea_2024 || null);
                edgar.push(f.edgar_2024 || null);
            });

            Highcharts.chart('container', {
                chart: {
                    type: 'scatter'
                },

                title: {
                    text: 'Methane Intensity Comparison'
                },

                subtitle: {
                    text: 'Satellite vs IEA vs EDGAR'
                },

                xAxis: {
                    categories: countries,
                    title: { text: 'Country' }
                },

                yAxis: {
                    title: { text: 'Methane Intensity' }
                },

                tooltip: {
                    shared: true,
                    formatter: function () {
                        return `<b>${this.x}</b><br/>
                            Satellite: ${satellite[this.point.index]}<br/>
                            IEA: ${iea[this.point.index]}<br/>
                            EDGAR: ${edgar[this.point.index]}`;
                    }
                },

                plotOptions: {
                    scatter: {
                        marker: {
                            radius: 5
                        }
                    }
                },

                series: [
                    {
                        name: 'Satellite (2019–2023 avg)',
                        data: satellite.map((y, i) => [i, y])
                    },
                    {
                        name: 'IEA 2024',
                        data: iea.map((y, i) => [i, y])
                    },
                    {
                        name: 'EDGAR 2024',
                        data: edgar.map((y, i) => [i, y])
                    }
                ]
            });

        } catch (error) {
            console.error('Error fetching data:', error);
        }
    }

    // initial load
    updateChart();

    // refresh every 10 minutes
    setInterval(updateChart, 600000);
</script>
</body>
</html>
