<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Plastic Waste to Ocean</title>
<script src="https://code.highcharts.com/highcharts.js"></script>
<style>
body { margin:0; font-family: Arial; }
#container { height: 450px; }
</style>
</head>
<body>

<div id="container"></div>

<script>
fetch('https://datasource.kapsarc.org/api/explore/v2.1/catalog/datasets/share-of-global-plastic-waste-emitted-to-the-ocean-2019/records?limit=10')
.then(res => res.json())
.then(data => {

    console.log("API sample:", data.results[0]); // 🔍 keep this for debugging

    const categories = [];
    const values = [];

    data.results.forEach(row => {

        // Try all possible country fields
        const country =
            row.country ||
            row.country_name ||
            row.entity ||
            row.ref_area;

        // Find the numeric value dynamically
        const value = Object.values(row).find(v => typeof v === 'number');

        if (country && value !== undefined) {
            categories.push(country);
            values.push(value);
        }
    });

    console.log("Parsed:", categories, values); // 🔍 check results

    Highcharts.chart('container', {
        chart: { type: 'column' },
        accessibility: { enabled: false },

        title: {
            text: 'Plastic Waste Emitted to Ocean (2019)'
        },

        xAxis: {
            categories: categories
        },

        yAxis: {
            title: { text: 'Share (%)' }
        },

        series: [{
            name: 'Share',
            data: values
        }]
    });

})
.catch(err => console.error("API ERROR:", err));
</script>

</body>
</html>
