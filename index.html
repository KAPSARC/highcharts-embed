<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Plastic Waste to Ocean</title>
<script src="https://code.highcharts.com/highcharts.js"></script>
<style>
body { margin:0; font-family: Arial; }
#container { height: 450px; }
</style>
</head>
<body>

<div id="container"></div>

<script>
fetch('https://datasource.kapsarc.org/api/explore/v2.1/catalog/datasets/share-of-global-plastic-waste-emitted-to-the-ocean-2019/records?limit=10')
.then(res => res.json())
.then(data => {

    console.log(data.results[0]); // 👈 ADD IT HERE

    const categories = [];
    const values = [];

    data.results.forEach(row => {
        const country =
            row.country ||
            row.country_name ||
            row.entity ||
            row.ref_area;

        const value = Object.values(row).find(v => typeof v === 'number');

        if (country && value !== undefined) {
            categories.push(country);
            values.push(value);
        }
    });

    Highcharts.chart('container', {
        chart: { type: 'column' },
        accessibility: { enabled: false },
        title: { text: 'Plastic Waste Emitted to Ocean (2019)' },
        xAxis: { categories: categories },
        series: [{ name: 'Share', data: values }]
    });

});
</script>

</body>
</html>
