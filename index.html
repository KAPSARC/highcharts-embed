<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Plastic Waste to Ocean</title>
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }
        #container {
            width: 100%;
            height: 450px;
        }
    </style>
</head>
<body>

<div id="container"></div>

<script>
fetch('https://datasource.kapsarc.org/api/explore/v2.1/catalog/datasets/share-of-global-plastic-waste-emitted-to-the-ocean-2019/records/?limit=10')
  .then(response => response.json())
  .then(apiData => {

    const categories = [];
    const values = [];

    // 🔍 Robust parsing (handles field variations safely)
    apiData.results.forEach(item => {
        const country = item.country || item.country_name || item.ref_area;

        // find numeric field automatically
        const value = Object.values(item).find(v => typeof v === 'number');

        if (country && value !== undefined) {
            categories.push(country);
            values.push(value);
        }
    });

    Highcharts.chart('container', {
        chart: { type: 'column' },

        accessibility: { enabled: false }, // remove warning

        title: { text: 'Top 10 Plastic Waste to Ocean (2019)' },

        xAxis: {
            categories: categories,
            title: { text: 'Country' }
        },

        yAxis: {
            title: { text: 'Share (%)' }
        },

        tooltip: {
            pointFormat: '<b>{point.y:.2f}%</b>'
        },

        series: [{
            name: 'Share',
            data: values
        }]
    });

  })
  .catch(err => console.error('API error:', err));
</script>

</body>
</html>
