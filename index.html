<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Methane Intensity Comparison</title>
<script src="https://code.highcharts.com/highcharts.js"></script>
<style>
body { margin:0; font-family: Arial; }
#container { height: 450px; }
</style>
</head>
<body>

<div id="container"></div>

<script>
fetch('https://datasource.kapsarc.org/api/explore/v2.1/catalog/datasets/methane-intensity-satellite-observed-vs-reported-emissions/records/?lang=en&limit=10&offset=0')
.then(res => res.json())

// 👇 THIS is where you put it
.then(data => {

    console.log('FULL RESPONSE:', data); // 🔍 debug

    if (!data.results) {
        console.error('Bad API response:', data);
        return;
    }

    const categories = [];
    const satellite = [];
    const iea = [];
    const edgar = [];

    data.results.forEach(row => {
        categories.push(row.country);
        satellite.push(row.satellite_2019_2023_average);
        iea.push(row.iea_2024);
        edgar.push(row.edgar_2024);
    });

    Highcharts.chart('container', {
        chart: {
            type: 'column'
        },

        accessibility: { enabled: false },

        title: {
            text: 'Methane Intensity Comparison'
        },

        subtitle: {
            text: 'Satellite vs IEA vs EDGAR'
        },

        xAxis: {
            categories: categories,
            crosshair: true
        },

        yAxis: {
            min: 0,
            title: {
                text: 'Methane Intensity'
            }
        },

        tooltip: {
            shared: true,
            valueDecimals: 3
        },

        plotOptions: {
            column: {
                pointPadding: 0.2,
                borderWidth: 0
            }
        },

        series: [
            {
                name: 'Satellite (2019–2023 Avg)',
                data: satellite
            },
            {
                name: 'IEA 2024',
                data: iea
            },
            {
                name: 'EDGAR 2024',
                data: edgar
            }
        ]
    });

})
.catch(err => console.error('API error:', err));
</script>

</body>
</html>
