<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Highcharts Column Chart</title>
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }
        #container {
            width: 100%;
            height: 400px;
        }
    </style>
</head>
<body>

<div id="container"></div>


<script>
fetch('https://datasource.kapsarc.org/api/explore/v2.1/catalog/datasets/share-of-global-plastic-waste-emitted-to-the-ocean-2019/records/?limit=10')
  .then(response => response.json())
  .then(apiData => {

    const categories = [];
    const values = [];

    apiData.results.forEach(item => {
        // ⚠️ Adjust these field names based on actual API response
        categories.push(item.country);
        values.push(item.share);
    });

    Highcharts.chart('container', {
        chart: { type: 'column' },
        title: { text: 'Plastic waste emitted to ocean (Top 10)' },
        xAxis: {
            categories: categories
        },
        yAxis: {
            title: { text: 'Share (%)' }
        },
        series: [{
            name: 'Share',
            data: values
        }]
    });

  });
</script>



</body>
</html>
