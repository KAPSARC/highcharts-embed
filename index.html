<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Methane Intensity Comparison</title>
<script src="https://code.highcharts.com/highcharts.js"></script>
<style>
body { margin:0; font-family: Arial; }
#container { height: 450px; }
</style>
</head>
<body>

<div id="container"></div>

<script>
fetch('https://datasource.kapsarc.org/api/explore/v2.1/catalog/datasets/methane-intensity-satellite-observed-vs-reported-emissions/records?limit=10')
.then(res => res.json())
.then(data => {

    console.log(data.results[0]); // 🔍 verify fields once

    const categories = [];
    const satellite = [];
    const iea = [];
    const edgar = [];

    data.results.forEach(row => {

        const country =
            row.country ||
            row.country_name ||
            row.entity;

        const sat = row.satellite_2019_2023_average;
        const ieaVal = row.iea_2024;
        const edgarVal = row.edgar_2024;

        if (country) {
            categories.push(country);
            satellite.push(sat ?? null);
            iea.push(ieaVal ?? null);
            edgar.push(edgarVal ?? null);
        }
    });

    Highcharts.chart('container', {
        chart: {
            type: 'column'
        },

        accessibility: { enabled: false },

        title: {
            text: 'Methane Intensity Comparison'
        },

        subtitle: {
            text: 'Satellite vs IEA vs EDGAR (2024)'
        },

        xAxis: {
            categories: categories,
            crosshair: true
        },

        yAxis: {
            min: 0,
            title: {
                text: 'Methane Intensity'
            }
        },

        tooltip: {
            shared: true
        },

        plotOptions: {
            column: {
                pointPadding: 0.2,
                borderWidth: 0
            }
        },

        series: [
            {
                name: 'Satellite (2019–2023 Avg)',
                data: satellite
            },
            {
                name: 'IEA 2024',
                data: iea
            },
            {
                name: 'EDGAR 2024',
                data: edgar
            }
        ]
    });

})
.catch(err => console.error('API error:', err));
</script>

</body>
</html>
