<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Waste Production Chart</title>
<script src="https://code.highcharts.com/highcharts.js"></script>
<style>
body { margin:0; font-family: Arial; }
#container { height: 500px; }
</style>
</head>
<body>

<div id="container"></div>

<script>
fetch('https://datasource.kapsarc.org/api/explore/v2.1/catalog/datasets/waste_production_rate_per_individual_en_0/records?limit=200')
.then(res => res.json())
.then(data => {

    console.log(data.results[0]); // 🔍 check structure

    // 👉 SELECT EXACT 3 VARIABLES (adjust if needed)
    const selectedVariables = [];

    const grouped = {};

    data.results.forEach(row => {

        const variable =
            row.variable ||
            row.indicator ||
            row.category;

        const year = row.year;
        const value = Object.values(row).find(v => typeof v === 'number');

        if (!variable || !year || value === undefined) return;

        if (!grouped[variable]) {
            grouped[variable] = {};
        }

        grouped[variable][year] = value;

        // collect first 3 variables dynamically
        if (!selectedVariables.includes(variable) && selectedVariables.length < 3) {
            selectedVariables.push(variable);
        }
    });

    // Get sorted list of years
    const years = [...new Set(data.results.map(r => r.year))].sort();

    // Build series like Highcharts example
    const series = selectedVariables.map(name => ({
        name: name,
        data: years.map(y => grouped[name]?.[y] ?? null)
    }));

    Highcharts.chart('container', {

        title: {
            text: 'Waste Production Growth',
            align: 'left'
        },

        subtitle: {
            text: 'Source: KAPSARC',
            align: 'left'
        },

        yAxis: {
            title: {
                text: 'Value'
            }
        },

        xAxis: {
            categories: years,
            accessibility: {
                rangeDescription: 'Range: ' + years[0] + ' to ' + years[years.length - 1]
            }
        },

        legend: {
            layout: 'vertical',
            align: 'right',
            verticalAlign: 'middle'
        },

        plotOptions: {
            series: {
                label: {
                    connectorAllowed: false
                }
            }
        },

        series: series,

        responsive: {
            rules: [{
                condition: {
                    maxWidth: 500
                },
                chartOptions: {
                    legend: {
                        layout: 'horizontal',
                        align: 'center',
                        verticalAlign: 'bottom'
                    }
                }
            }]
        }

    });

})
.catch(err => console.error('API error:', err));
</script>

</body>
</html>
